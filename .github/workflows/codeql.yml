name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan picks up newly-disclosed CodeQL queries firing on
    # unchanged code.
    - cron: "37 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Compile (drives CodeQL extraction)
        # CodeQL's Java tracer wraps `javac` invocations; if Gradle reports
        # `classes` as UP-TO-DATE (which happens on PRs that touch no
        # source files — README-only / CHANGELOG-only / workflow-only),
        # the tracer sees zero compilations and the analyze step fails
        # with "could not process any code written in Java/Kotlin".
        # `clean` forces a recompile every run; `--no-build-cache`
        # belt-and-braces against the gradle/actions/setup-gradle@v6
        # build-cache restore.
        run: ./gradlew --no-daemon --no-build-cache clean classes

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
