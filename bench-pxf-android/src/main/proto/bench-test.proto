// Canonical PXF benchmark fixture, shared across all language ports.
//
// Each port reads `bench-test.pxf` (text) into a `bench.v1.Config`,
// times unmarshal + marshal, and prints results in a stable JSON shape
// (see scripts/cross_pxf_bench.sh).
syntax = "proto3";
package bench.v1;

// java_package added locally for the lite-tier consumer in
// :bench-pxf-android; protoc-gen-pxf-java-meta requires it for codegen.
// The canonical testdata/bench-test.proto in the protowire repo doesn't
// set java_package because the full-runtime :bench-pxf goes through
// DynamicMessage, not typed Java classes — so this is wire-irrelevant
// divergence (java_package only affects Java class names, never the
// wire output).
option java_package = "bench.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

message Config {
  string hostname = 1;
  int32 port = 2;
  bool enabled = 3;
  double weight = 4;
  Status status = 5;
  repeated string tags = 6;
  TLS tls = 7;
  map<string, string> labels = 8;
  repeated Endpoint endpoints = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Duration timeout = 11;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_SERVING = 1;
}

message TLS {
  string cert_file = 1;
  string key_file = 2;
  bool verify = 3;
}

message Endpoint {
  string path = 1;
  string method = 2;
  int32 timeout_ms = 3;
}
