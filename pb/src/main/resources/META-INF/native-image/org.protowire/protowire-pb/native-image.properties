# GraalVM native-image hints for protowire-pb.
#
# protowire-pb is a schema-free struct ↔ proto3 binary marshaler driven
# by the @ProtoField(N) annotation on consumer types. Java reflection
# is used to enumerate the @ProtoField-annotated fields at marshal /
# unmarshal time (see Pb.java — `cls.getDeclaredFields()`).
#
# That means CONSUMER classes carrying @ProtoField MUST be reachable via
# reflection in the native image. Consumers register them in their own
# native-image config, e.g.:
#
#   {
#     "name": "com.example.MyDto",
#     "allDeclaredFields": true,
#     "allDeclaredConstructors": true
#   }
#
# Or, if using the Spring AOT / Quarkus / Helidon native plugins, those
# frameworks usually pick up annotated fields automatically.
#
# This file initializes protowire-pb's own internal package at build
# time (no static state); it does not register anything from the
# consumer's package, which is impossible to know at our build time.

Args = --initialize-at-build-time=org.protowire.pb
