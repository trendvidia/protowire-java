# GraalVM native-image hints for protowire-pxf.
#
# protowire-pxf's reflection surface is entirely the protobuf-java
# descriptor API (Message.getField, FieldDescriptor.findFieldByName,
# DynamicMessage). protobuf-java ships its own native-image metadata,
# so consumers building a native-image with protowire-pxf only need to:
#
#   1. Have a recent protobuf-java (>= 3.25) on the classpath — its
#      META-INF/native-image/com.google.protobuf/protobuf-java/ entries
#      are already loaded by GraalVM at image-build time.
#   2. Register their own .proto-generated message classes for
#      reflection. The protobuf-java native-image agent + protoc-gen-java
#      configuration handle this automatically when the agent is run
#      against a representative workload.
#
# This file is intentionally empty of arguments; it exists to mark the
# protowire-pxf jar as carrying explicit GraalVM hints (which silences
# the "missing reachability metadata" warning at image-build time).

Args = --initialize-at-build-time=org.protowire.pxf
