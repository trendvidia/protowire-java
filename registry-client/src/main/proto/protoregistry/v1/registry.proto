syntax = "proto3";

package protoregistry.v1;

option java_package = "com.trendvidia.protoregistry.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "google/protobuf/descriptor.proto";

service RegistryService {
  rpc Publish(PublishRequest) returns (PublishResponse);
  rpc Promote(PromoteRequest) returns (PromoteResponse);
  rpc DiscardStaging(DiscardStagingRequest) returns (DiscardStagingResponse);
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  rpc ListSchemas(ListSchemasRequest) returns (ListSchemasResponse);
  rpc GetDescriptor(GetDescriptorRequest) returns (GetDescriptorResponse);
  rpc GetSource(GetSourceRequest) returns (GetSourceResponse);
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse);
}

message PublishRequest {
  string namespace_id = 1;
  string schema_id = 2;
  map<string, bytes> sources = 3;
  string created_by = 4;
  map<string, string> metadata = 5;
  bool force = 6;
}

message PublishResponse {
  uint64 version = 1;
  string fingerprint = 2;
  bool no_change = 3;
}

message PromoteRequest {
  string namespace_id = 1;
}

message PromoteResponse {
  repeated PromotedSchema promoted = 1;
}

message PromotedSchema {
  string schema_id = 1;
  uint64 current_version = 2;
}

message DiscardStagingRequest {
  string namespace_id = 1;
}

message DiscardStagingResponse {}

message RollbackRequest {
  string namespace_id = 1;
  string schema_id = 2;
  uint64 version = 3;
}

message RollbackResponse {}

message GetSchemaRequest {
  string namespace_id = 1;
  string schema_id = 2;
}

message GetSchemaResponse {
  SchemaInfo schema = 1;
}

message SchemaInfo {
  string namespace_id = 1;
  string schema_id = 2;
  optional uint64 current_version = 3;
  optional uint64 staged_version = 4;
  google.protobuf.Timestamp created_at = 5;
  map<string, string> metadata = 6;
  repeated uint64 versions = 7;
}

message ListSchemasRequest {
  string namespace_id = 1;
}

message ListSchemasResponse {
  repeated SchemaInfo schemas = 1;
}

message GetDescriptorRequest {
  string namespace_id = 1;
  string schema_id = 2;
  uint64 version = 3;
}

message GetDescriptorResponse {
  uint64 version = 1;
  google.protobuf.FileDescriptorSet file_descriptor_set = 2;
}

message GetSourceRequest {
  string namespace_id = 1;
  string schema_id = 2;
  uint64 version = 3;
}

message GetSourceResponse {
  uint64 version = 1;
  map<string, bytes> sources = 2;
}

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated NamespaceInfo namespaces = 1;
}

message NamespaceInfo {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  map<string, string> metadata = 3;
}

message CreateNamespaceRequest {
  string id = 1;
  map<string, string> metadata = 2;
}

message CreateNamespaceResponse {}
