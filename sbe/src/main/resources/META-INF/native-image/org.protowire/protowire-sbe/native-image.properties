# GraalVM native-image hints for protowire-sbe.
#
# protowire-sbe drives marshaling from a TemplateBuilder constructed
# off protobuf-java descriptors (BuilderInfo, MessageDescriptor,
# FieldDescriptor). All of that goes through the protobuf-java
# descriptor API, which has its own native-image metadata.
#
# Consumers building a native image only need to register their own
# .proto-generated message classes — protobuf-java's own metadata
# covers the rest.

Args = --initialize-at-build-time=org.protowire.sbe
